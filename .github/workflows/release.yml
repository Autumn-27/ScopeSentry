name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "发布版本号（如 v1.9.2）"
        required: true
        type: string

env:
  DOCKER_IMAGE: autumn27/scopesentry
  GO_VERSION: "1.24"
  NODE_VERSION: "20"

jobs:
  release:
    name: Build & Publish
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            RAW_TAG="${{ github.event.inputs.version }}"
          else
            RAW_TAG="${GITHUB_REF#refs/tags/}"
          fi
          RAW_TAG="${RAW_TAG#v}"
          if [ -z "${RAW_TAG}" ]; then
            echo "Invalid version" >&2
            exit 1
          fi
          echo "tag=v${RAW_TAG}" >> "$GITHUB_OUTPUT"
          echo "semver=${RAW_TAG}" >> "$GITHUB_OUTPUT"
          echo "Releasing version: ${RAW_TAG}"

      - name: Create tag (manual release)
        if: github.event_name == 'workflow_dispatch'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "${{ steps.version.outputs.tag }}" -m "Release ${{ steps.version.outputs.tag }}"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend to dist-pro
        working-directory: frontend
        env:
          HUSKY: "0"
        run: |
          npm ci
          npx vite build --mode pro
          test -d dist-pro || (echo "frontend/dist-pro not found after build" >&2 && exit 1)

      - name: Overlay frontend into cmd/main/static
        run: |
          # 将 dist-pro 产物覆盖合并到 static，保留 static 中 draco/lib/plugins 等其他模块
          rsync -a frontend/dist-pro/ cmd/main/static/

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: go.sum

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: dockerfile
          push: false
          load: true
          tags: |
            ${{ env.DOCKER_IMAGE }}:${{ steps.version.outputs.semver }}
            ${{ env.DOCKER_IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Push version tag
        run: |
          docker push "${{ env.DOCKER_IMAGE }}:${{ steps.version.outputs.semver }}"

      - name: Push latest tag
        run: |
          docker push "${{ env.DOCKER_IMAGE }}:latest"

      - name: Release summary
        run: |
          {
            echo "## Release ${{ steps.version.outputs.tag }}"
            echo ""
            echo "- GitHub Release: https://github.com/${{ github.repository }}/releases/tag/${{ steps.version.outputs.tag }}"
            echo "- Docker: \`${{ env.DOCKER_IMAGE }}:${{ steps.version.outputs.semver }}\`"
            echo "- Docker (latest): \`${{ env.DOCKER_IMAGE }}:latest\`"
          } >> "$GITHUB_STEP_SUMMARY"
